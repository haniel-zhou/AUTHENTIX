<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- 绿色渐变 -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#166534"/>
    </linearGradient>
    <!-- 鞋底纹图案 -->
    <pattern id="solePattern" x="0" y="0" width="12" height="8" patternUnits="userSpaceOnUse">
      <rect x="2" y="2" width="8" height="4" rx="2" fill="#14532d" opacity="0.6"/>
    </pattern>
  </defs>

  <!-- 背景圆 - 绿色认证章 -->
  <circle cx="70" cy="100" r="65" fill="url(#greenGrad)"/>

  <!-- 鞋底纹区域（底部） -->
  <path d="M20 140 Q70 155 120 140 L120 145 Q70 160 20 145 Z" fill="url(#solePattern)"/>
  <path d="M15 150 Q70 165 125 150 L125 155 Q70 170 15 155 Z" fill="url(#solePattern)" opacity="0.7"/>

  <!-- 中间"真"字 -->
  <text x="70" y="115" font-size="52" font-weight="900" fill="#fffdf6"
        text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif">真</text>

  <!-- 外圈装饰线 -->
  <circle cx="70" cy="100" r="60" fill="none" stroke="#fffdf6" stroke-width="2" opacity="0.3"/>
  <circle cx="70" cy="100" r="55" fill="none" stroke="#fffdf6" stroke-width="1" opacity="0.2"/>
</svg>
