<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80">
  <defs>
    <!-- 绿色渐变 -->
    <linearGradient id="greenBadge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#166534"/>
    </linearGradient>
    <!-- 鞋底纹图案 -->
    <pattern id="solePattern" x="0" y="0" width="10" height="6" patternUnits="userSpaceOnUse">
      <rect x="1" y="1" width="8" height="4" rx="2" fill="#14532d" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- 绿色圆形认证章 -->
  <circle cx="40" cy="40" r="36" fill="url(#greenBadge)"/>

  <!-- 鞋底纹区域（底部） -->
  <path d="M10 65 Q40 75 70 65 L70 68 Q40 78 10 68 Z" fill="url(#solePattern)"/>
  <path d="M8 72 Q40 80 72 72 L72 74 Q40 82 8 74 Z" fill="url(#solePattern)" opacity="0.6"/>

  <!-- 中间"真"字 -->
  <text x="40" y="50" font-size="32" font-weight="900" fill="#fffdf6"
        text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif">真</text>

  <!-- 外圈装饰线 -->
  <circle cx="40" cy="40" r="32" fill="none" stroke="#fffdf6" stroke-width="1.5" opacity="0.3"/>

  <!-- 文字：鉴真仓 -->
  <text x="90" y="52" font-size="28" font-weight="800" fill="#166534"
        font-family="'Noto Sans SC', 'PingFang SC', sans-serif">鉴真仓</text>
</svg>
